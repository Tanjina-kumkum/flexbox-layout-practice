<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-layout</title>
    <link rel="stylesheet" href="./flex.css">
</head>
<body>
    <h6>Flex-box layout</h6>
    <div class="container">
        <div class="box">Box-1</div>
        <div class="box">Box-2</div>
        <div class="box">Box-3</div>
        <div class="box">Box-4</div>
        <div class="box">Box-5</div>
        <div class="box">Box-6</div>
        <div class="box">Box-7</div>
        <div class="box">Box-8</div>
        <div class="box">Box-9</div>
        <div class="box">Box-10</div>
    </div>
    <div class="container-box">
        <div class="flex-box">flex-1</div>
        <div class="flex-box">flex-2</div>
        <div class="flex-box">flex-3</div>
        <div class="flex-box">flex-4</div>
        <div class="flex-box">flex-5</div>
        <div class="flex-box">flex-6</div>
        <div class="flex-box">flex-7</div>
        <div class="flex-box">flex-8</div>
        <div class="flex-box">flex-9</div>
        <div class="flex-box">flex-10</div>
    </div>

    <div class="container-pot">
        <div class="pot">pot-1</div>
        <div class="pot">pot-2</div>
        <div class="pot">pot-3</div>
    </div>
</body>
</html>
