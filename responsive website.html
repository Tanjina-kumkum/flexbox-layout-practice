<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive website</title>
    <style>
        .image-container{
            display: flex;
            max-width: 1240px;
            margin: 0 auto;
            border: 1px solid red;
            gap: 20px;
        }
        .image-container div{
            width: 50%;
        }
       .image-container img{
        width: 100%;
       }
        
        @media screen and (max-width:576px) {
            .image-container{
                flex-direction: column-reverse;
            }
            .image-container div{
            width: 100%;
        } 
        }
    </style>
</head>
<body>
   
    <header>
         <h1>Responsive website</h1>
        <ol>
        <li>viewport meta tag</li>
        <li>CSS Relative unit</li>
        <li>body max width and horizontal center align</li>
        <li>fluid image</li>
        <li>two column flex and use media query with flex direction column</li>
        <li>multi-column: grid layout</li>
        <li>menu responsive: will need javascript</li>
    </ol>
    </header>
    <main>
        <div class="image-container">
            <div>
                <img src="./images.jpg" alt="">
            </div>
            <div>
                <img src="./Dress for women.avif" alt="">
            </div>
        </div>
    </main>
</body>
</html>
